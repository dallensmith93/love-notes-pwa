# Install + build from repo root so we always use client/package-lock.json (avoids bad hoisted brace-expansion@2.0.3 in root lock).
[build]
  command = "npm ci --prefix client && npm run build --prefix client"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy Quotable on same origin (browser CORS blocks many direct api.quotable.io calls from production)
[[redirects]]
  from = "/api/quotable/*"
  to = "https://api.quotable.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
