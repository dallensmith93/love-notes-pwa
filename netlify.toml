[build]
  # Repo root uses npm workspaces; Vite output lives in client/dist
  command = "npm install && npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"
  # Install devDependencies (TypeScript, Vite, PWA plugin) — Netlify can skip them when NODE_ENV=production
  NPM_CONFIG_PRODUCTION = "false"

# React Router: direct loads / refreshes on /favorites, /settings, etc.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
