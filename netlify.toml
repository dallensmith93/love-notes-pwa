# Build only the Vite app from /client (avoids npm workspace + root lockfile edge cases on CI).
# Deployment: Netlify runs npm ci in /client using client/package-lock.json; publish = client/dist.
[build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router — refresh / deep link on /favorites, /settings, etc.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
